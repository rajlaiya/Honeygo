<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/assets/honey2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta Tags -->
    <title>HoneyGo | Raw Natural Honey, Combos & Wellness Benefits</title>
    <meta
      name="title"
      content="HoneyGo | Raw Natural Honey, Combos & Wellness Benefits"
    />
    <meta
      name="description"
      content="Shop raw, unfiltered honey and curated combos. Discover benefits, traditional wellness uses, reviews, gallery and limited seasonal offers at HoneyGo."
    />
    <meta
      name="keywords"
      content="raw honey, natural honey, unfiltered honey, wildflower honey, acacia honey, honey benefits, honey combos, immunity, throat soothing"
    />
    <meta name="author" content="HoneyGo" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.example.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.example.com/" />
    <meta
      property="og:title"
      content="HoneyGo | Raw Natural Honey, Combos & Wellness Benefits"
    />
    <meta
      property="og:description"
      content="Discover pure raw honey, wellness benefits, disease-specific traditional uses, scratch coupon offers and premium seasonal jars."
    />
    <meta property="og:image" content="/public/vite.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.example.com/" />
    <meta
      name="twitter:title"
      content="HoneyGo | Raw Natural Honey, Combos & Wellness Benefits"
    />
    <meta
      name="twitter:description"
      content="Discover pure raw honey, wellness benefits, disease-specific traditional uses, scratch coupon offers and premium seasonal jars."
    />
    <meta name="twitter:image" content="/public/vite.svg" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "HoneyGo",
        "image": "https://www.example.com/images/og-honeygo.jpg",
        "@id": "https://www.example.com/",
        "url": "https://www.example.com/",
        "description": "Raw unfiltered honey products, seasonal harvest jars, wellness-focused combos and educational benefits.",
        "brand": { "@type": "Brand", "name": "HoneyGo" },
        "offers": {
          "@type": "AggregateOffer",
          "priceCurrency": "USD",
          "lowPrice": "5.99",
          "highPrice": "49.99"
        },
        "sameAs": [
          "https://www.facebook.com/",
          "https://www.instagram.com/",
          "https://twitter.com/"
        ]
      }
    </script>

    <!-- Performance Prefetch / DNS -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
